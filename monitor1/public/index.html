<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickSight Kiosk</title>
<style>
  :root {
    --bg:        #0d0f12;
    --surface:   #151820;
    --border:    #1f2430;
    --accent:    #e8973a;
    --text:      #c9d1e0;
    --muted:     #4a5268;
    --green:     #3ecf8e;
    --red:       #e85a4f;
    --font:      'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
    --ease:      600ms cubic-bezier(0.4, 0, 0.2, 1);
    --hud-h:     52px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; user-select: none; }

  /* ── HUD ──────────────────────────────────────────────────── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; height: var(--hud-h);
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 18px; z-index: 100;
  }
  .h-logo  { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; white-space: nowrap; }
  .h-div   { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
  .h-label { font-size: 10px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .h-val   { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .h-name  { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
  .h-count { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .spacer  { flex: 1; }

  /* Status */
  .h-status { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .dot      { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-live { background: var(--green); animation: pulse 2s ease-in-out infinite; }
  .dot-err  { background: var(--red); }
  .dot-load { background: var(--accent); animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Ring */
  .ring     { width: 28px; height: 28px; flex-shrink: 0; position: relative; }
  .ring svg { transform: rotate(-90deg); }
  .r-track  { stroke: var(--border); fill: none; }
  .r-fill   { stroke: var(--accent); fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  #ring-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--accent); }

  /* ── Progress bar ─────────────────────────────────────────── */
  #prog { position: fixed; top: var(--hud-h); left: 0; right: 0; height: 3px; background: var(--border); z-index: 100; }
  #prog-fill { height: 100%; background: var(--accent); transition: width 1s linear; width: 0; }

  /* ── Viewport & slides ────────────────────────────────────── */
  #viewport { position: fixed; top: calc(var(--hud-h) + 3px); left: 0; right: 0; bottom: 0; overflow: hidden; }
  .slide    { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity var(--ease); }
  .slide.active { opacity: 1; pointer-events: all; }
  .slide iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ── Auto-scroll for slides that need it ──────────────────── */
  /* The iframe is made taller than the viewport; translateX pulls
     it upward to reveal content below the visible area. */
  .slide.scrolling iframe {
    height: 160%;
    transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── Dot rail ─────────────────────────────────────────────── */
  #dots {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 100; align-items: center;
    max-width: 90vw; flex-wrap: wrap; justify-content: center;
  }
  .ndot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); cursor: pointer;
    transition: background 0.3s, transform 0.3s;
    flex-shrink: 0;
  }
  .ndot.active { background: var(--accent); transform: scale(1.4); }
  .ndot:hover  { background: var(--text); }

  /* ── Overlay ──────────────────────────────────────────────── */
  #overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px; z-index: 200; transition: opacity 0.5s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #ov-icon  { font-size: 30px; }
  #ov-title { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  #ov-msg   { font-size: 11px; color: var(--muted); max-width: 440px; text-align: center; line-height: 1.9; }
  #retry    { padding: 9px 26px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--font); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 4px; display: none; }
  #retry:hover { background: rgba(232,151,58,0.1); }

  /* ── Refresh flash ────────────────────────────────────────── */
  #flash { position: fixed; inset: 0; background: var(--accent); opacity: 0; pointer-events: none; z-index: 190; transition: opacity 0.25s; }
</style>
</head>
<body>

<div id="hud">
  <span class="h-logo" id="hud-title">Kiosk</span>
  <div class="h-div"></div>
  <span class="h-label">Now showing</span>
  <span class="h-name" id="hud-name">Loading…</span>
  <span class="h-count" id="hud-count"></span>
  <div class="h-div"></div>
  <span class="h-label">Next in</span>
  <div class="ring">
    <svg width="28" height="28" viewBox="0 0 28 28">
      <circle class="r-track" cx="14" cy="14" r="11" stroke-width="2.5"/>
      <circle class="r-fill" id="ring-fill" cx="14" cy="14" r="11" stroke-width="2.5" stroke-dasharray="69.1" stroke-dashoffset="0"/>
    </svg>
    <div id="ring-num">—</div>
  </div>
  <div class="h-div"></div>
  <span class="h-label">Refresh in</span>
  <span class="h-val" id="hud-ref">—</span>
  <div class="spacer"></div>
  <span class="h-val" id="hud-clock" style="font-size:11px"></span>
  <div class="h-div"></div>
  <div class="h-status">
    <div class="dot dot-load" id="status-dot"></div>
    <span id="status-txt">Connecting</span>
  </div>
</div>

<div id="prog"><div id="prog-fill"></div></div>
<div id="viewport"></div>
<div id="dots"></div>
<div id="flash"></div>

<div id="overlay">
  <div id="ov-icon">⏳</div>
  <div id="ov-title">Loading dashboards</div>
  <div id="ov-msg">Fetching configuration and signed embed URLs…</div>
  <button id="retry" onclick="init()">↺ Retry</button>
</div>

<script>
/* ── Runtime state ───────────────────────────────────────────── */
let slides      = [];      // [{ name, embedUrl, autoScroll }]
let current     = 0;
let rotSecs     = 60;
let refSecs     = 600;
let rotCount    = 60;
let refCount    = 600;
let ready       = false;
let ticker      = null;
let scrollTimer = null;
let scrollDir   = 0;      // 0=not scrolling, 1=down, -1=up
const CIRC      = 2 * Math.PI * 11;
const SCROLL_INTERVAL = 15; // seconds before auto-scrolling
const SCROLL_STEP   = 120;  // pixels per scroll step

/* ── Overlay ─────────────────────────────────────────────────── */
function overlay(icon, title, msg, showRetry = false) {
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('ov-icon').textContent  = icon;
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-msg').textContent   = msg;
  document.getElementById('retry').style.display  = showRetry ? 'inline-block' : 'none';
}
function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

/* ── Status dot ──────────────────────────────────────────────── */
function setStatus(type, text) {
  const d = document.getElementById('status-dot');
  d.className = 'dot ' + ({ live: 'dot-live', error: 'dot-err', load: 'dot-load' }[type] || 'dot-load');
  document.getElementById('status-txt').textContent = text;
}

/* ── Build DOM for N slides ──────────────────────────────────── */
function buildSlides(count) {
  const vp   = document.getElementById('viewport');
  const dots = document.getElementById('dots');
  vp.innerHTML   = '';
  dots.innerHTML = '';

  for (let i = 0; i < count; i++) {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.id = `slide-${i}`;
    const fr = document.createElement('iframe');
    fr.id = `frame-${i}`;
    fr.src = 'about:blank';
    fr.allowFullscreen = true;
    div.appendChild(fr);
    vp.appendChild(div);

    const dot = document.createElement('div');
    dot.className = 'ndot' + (i === 0 ? ' active' : '');
    dot.id = `dot-${i}`;
    dot.title = slides[i]?.name || `Slide ${i + 1}`;
    dot.onclick = () => goTo(i);
    dots.appendChild(dot);
  }
}

/* ── Load embed URLs into iframes ────────────────────────────── */
function applyEmbedUrls() {
  slides.forEach((s, i) => {
    document.getElementById(`frame-${i}`).src = s.embedUrl;
  });
}

/* ── Rotation ────────────────────────────────────────────────── */
function goTo(idx) {
  stopAutoScroll();
  const oldSlide = document.getElementById(`slide-${current}`);
  if (oldSlide) {
    oldSlide.classList.remove('active');
    oldSlide.classList.remove('scrolling');
    const oldFrame = document.getElementById(`frame-${current}`);
    if (oldFrame) oldFrame.style.transform = '';
  }
  current = idx;
  document.getElementById(`slide-${current}`).classList.add('active');
  document.getElementById(`dot-${current}`).classList.add('active');
  document.getElementById('hud-name').textContent  = slides[current]?.name || '—';
  document.getElementById('hud-count').textContent = `(${current + 1} / ${slides.length})`;
  rotCount = rotSecs;
  setTimeout(startAutoScroll, 700);
}

function next() { goTo((current + 1) % slides.length); }

/* ── Auto-scroll for long list slides ────────────────────────── */
function startAutoScroll() {
  stopAutoScroll();
  const slide = slides[current];
  if (!slide?.autoScroll) return;

  const el = document.getElementById(`slide-${current}`);
  el.classList.add('scrolling');
  scrollDir = 1;

  scrollTimer = setInterval(() => {
    const iframe = document.getElementById(`frame-${current}`);
    if (!iframe) return;
    scrollDir *= -1;
    const currentTransform = iframe.style.transform || 'translateY(0px)';
    const currentY = parseInt(currentTransform.replace(/[^0-9\-]/g, ''), 10) || 0;
    // Negative Y pulls the taller iframe upward to reveal content below
    const maxScroll = -SCROLL_STEP * 8;  // max 8 steps up
    const newY = scrollDir === 1
      ? Math.max(currentY - SCROLL_STEP, maxScroll)
      : Math.min(currentY + SCROLL_STEP, 0);
    iframe.style.transform = `translateY(${newY}px)`;
  }, SCROLL_INTERVAL * 1000);
}

function stopAutoScroll() {
  if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
  scrollDir = 0;
}

/* ── HUD update ──────────────────────────────────────────────── */
function updateHUD() {
  if (!ready) return;
  const pct = rotCount / rotSecs;
  document.getElementById('ring-fill').style.strokeDashoffset = CIRC * (1 - pct);
  document.getElementById('ring-num').textContent  = Math.ceil(rotCount);
  document.getElementById('prog-fill').style.width = ((1 - pct) * 100) + '%';
  const m = Math.floor(refCount / 60), s = String(Math.floor(refCount % 60)).padStart(2, '0');
  document.getElementById('hud-ref').textContent   = `${m}:${s}`;
}

/* ── Clock ───────────────────────────────────────────────────── */
function tickClock() {
  document.getElementById('hud-clock').textContent =
    new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(tickClock, 1000);
tickClock();

/* ── Fetch config from server ────────────────────────────────── */
async function fetchConfig() {
  const res = await fetch('/api/config');
  if (!res.ok) throw new Error(`Config fetch failed: HTTP ${res.status}`);
  return res.json();
}

/* ── Fetch embed URLs ────────────────────────────────────────── */
async function fetchEmbedUrls() {
  const res = await fetch('/api/embed');
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.hint || body.error || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.slides;
}

/* ── Refresh (called every 10 min) ──────────────────────────── */
async function refresh() {
  setStatus('load', 'Refreshing');
  stopAutoScroll();
  const flash = document.getElementById('flash');
  flash.style.opacity = '0.06';
  setTimeout(() => { flash.style.opacity = '0'; }, 300);
  try {
    slides = await fetchEmbedUrls();
    if (slides[1]) slides[1].autoScroll = true;
    applyEmbedUrls();
    refCount = refSecs;
    setStatus('live', 'Live');
    if (ready) startAutoScroll();
  } catch (err) {
    console.error('Refresh failed:', err.message);
    setStatus('error', 'Refresh failed');
    // Keep showing existing iframes; retry next cycle
  }
}

/* ── Main tick ───────────────────────────────────────────────── */
function startTicker() {
  if (ticker) clearInterval(ticker);
  ticker = setInterval(() => {
    if (!ready) return;
    rotCount = Math.max(0, rotCount - 1);
    refCount = Math.max(0, refCount - 1);
    updateHUD();
    if (rotCount <= 0) next();
    if (refCount <= 0) refresh();
  }, 1000);
}

/* ── Boot ────────────────────────────────────────────────────── */
async function init() {
  ready = false;
  overlay('⏳', 'Loading dashboards', 'Fetching configuration and signed embed URLs…');

  try {
    // 1. Get display config (title, timing, slide count)
    const cfg = await fetchConfig();
    document.getElementById('hud-title').textContent = cfg.title;
    document.title = cfg.title;
    rotSecs  = cfg.rotateMs  / 1000;
    refSecs  = cfg.refreshMs / 1000;
    rotCount = rotSecs;
    refCount = refSecs;

    // 2. Pre-populate slide names so buildSlides has them
    slides = cfg.slideNames.map(name => ({ name, embedUrl: 'about:blank' }));
    buildSlides(cfg.slideCount);

    // 3. Fetch actual embed URLs
    setStatus('load', 'Fetching URLs');
    slides = await fetchEmbedUrls();
    // Mark slide 2 (index 1) for auto-scrolling (list content gets cut off)
    if (slides[1]) slides[1].autoScroll = true;
    applyEmbedUrls();

    // 4. Show first slide
    document.getElementById('hud-name').textContent  = slides[0].name;
    document.getElementById('hud-count').textContent = `(1 / ${slides.length})`;

    setStatus('live', 'Live');
    hideOverlay();
    ready = true;
    startTicker();

  } catch (err) {
    console.error('Init failed:', err);
    setStatus('error', 'Error');
    overlay('⚠', 'Connection Error', err.message, true);
  }
}

init();
</script>
</body>
</html>
