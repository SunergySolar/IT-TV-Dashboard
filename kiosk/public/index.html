<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickSight Kiosk</title>
<script src="https://unpkg.com/amazon-quicksight-embedding-sdk@2.9.0/dist/quicksight-embedding-js-sdk.min.js"></script>
<style>
  :root {
    --bg:        #0d0f12;
    --surface:   #151820;
    --border:    #1f2430;
    --accent:    #e8973a;
    --text:      #c9d1e0;
    --muted:     #4a5268;
    --green:     #3ecf8e;
    --red:       #e85a4f;
    --font:      'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
    --ease:      600ms cubic-bezier(0.4, 0, 0.2, 1);
    --hud-h:     52px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; user-select: none; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; height: var(--hud-h);
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 18px; z-index: 100;
  }
  .h-logo  { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; white-space: nowrap; }
  .h-div   { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
  .h-label { font-size: 10px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .h-val   { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .h-name  { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
  .h-count { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .spacer  { flex: 1; }
  .h-status { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .dot      { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-live { background: var(--green); animation: pulse 2s ease-in-out infinite; }
  .dot-err  { background: var(--red); }
  .dot-load { background: var(--accent); animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .ring     { width: 28px; height: 28px; flex-shrink: 0; position: relative; }
  .ring svg { transform: rotate(-90deg); }
  .r-track  { stroke: var(--border); fill: none; }
  .r-fill   { stroke: var(--accent); fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  #ring-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--accent); }

  #prog { position: fixed; top: var(--hud-h); left: 0; right: 0; height: 3px; background: var(--border); z-index: 100; }
  #prog-fill { height: 100%; background: var(--accent); transition: width 1s linear; width: 0; }

  #viewport { position: fixed; top: calc(var(--hud-h) + 3px); left: 0; right: 0; bottom: 0; overflow: hidden; }
  #qs-container { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ── Auto-scroll for slides that need it ──────────────────── */
  #qs-container.scrolling {
    height: 160%;
    transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  #dots {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 100; align-items: center;
    max-width: 90vw; flex-wrap: wrap; justify-content: center;
  }
  .ndot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); cursor: pointer; transition: background 0.3s, transform 0.3s; flex-shrink: 0; }
  .ndot.active { background: var(--accent); transform: scale(1.4); }
  .ndot:hover  { background: var(--text); }

  #overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px; z-index: 200; transition: opacity 0.5s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #ov-icon  { font-size: 30px; }
  #ov-title { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  #ov-msg   { font-size: 11px; color: var(--muted); max-width: 440px; text-align: center; line-height: 1.9; }
  #retry    { padding: 9px 26px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--font); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 4px; display: none; }
  #retry:hover { background: rgba(232,151,58,0.1); }

  #flash { position: fixed; inset: 0; background: var(--accent); opacity: 0; pointer-events: none; z-index: 190; transition: opacity 0.25s; }

  #pause-btn {
    padding: 3px 10px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: var(--font); font-size: 9px;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    border-radius: 3px; white-space: nowrap; transition: color 0.2s, border-color 0.2s;
  }
  #pause-btn:hover { color: var(--accent); border-color: var(--accent); }
  #pause-btn.paused { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div id="hud">
  <span class="h-logo" id="hud-title">Kiosk</span>
  <div class="h-div"></div>
  <span class="h-label">Now showing</span>
  <span class="h-name" id="hud-name">Loading…</span>
  <span class="h-count" id="hud-count"></span>
  <div class="h-div"></div>
  <span class="h-label">Next in</span>
  <div class="ring">
    <svg width="28" height="28" viewBox="0 0 28 28">
      <circle class="r-track" cx="14" cy="14" r="11" stroke-width="2.5"/>
      <circle class="r-fill" id="ring-fill" cx="14" cy="14" r="11" stroke-width="2.5" stroke-dasharray="69.1" stroke-dashoffset="0"/>
    </svg>
    <div id="ring-num">—</div>
  </div>
  <div class="h-div"></div>
  <span class="h-label">Refresh in</span>
  <span class="h-val" id="hud-ref">—</span>
  <div class="spacer"></div>
  <span class="h-val" id="hud-clock" style="font-size:11px"></span>
  <div class="h-div"></div>
  <div class="h-status">
    <div class="dot dot-load" id="status-dot"></div>
    <span id="status-txt">Connecting</span>
  </div>
</div>

<div id="prog"><div id="prog-fill"></div></div>
<div id="viewport"></div>
<div id="dots"></div>
<div id="flash"></div>

<div id="overlay">
  <div id="ov-icon">⏳</div>
  <div id="ov-title">Loading dashboards</div>
  <div id="ov-msg">Fetching configuration and signed embed URLs…</div>
  <button id="retry" onclick="init()">↺ Retry</button>
</div>

<script>
/* ── Runtime state ───────────────────────────────────────────── */
let slides           = [];
let current          = 0;
let rotSecs          = 60;
let refSecs          = 600;
let rotCount         = 60;
let refCount         = 600;
let ready            = false;
let ticker           = null;
let embeddedDash     = null;
let dashLoaded       = false;
let scrollTimer      = null;
let scrollDir        = 0;
let autoScrollSlides = [];
const CIRC           = 2 * Math.PI * 11;
const SCROLL_INTERVAL = 15;
const SCROLL_STEP     = 120;

/* ── Helpers ─────────────────────────────────────────────────── */
function overlay(icon, title, msg, showRetry = false) {
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('ov-icon').textContent  = icon;
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-msg').textContent   = msg;
  document.getElementById('retry').style.display  = showRetry ? 'inline-block' : 'none';
}
function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

function setStatus(type, text) {
  const d = document.getElementById('status-dot');
  d.className = 'dot ' + ({ live: 'dot-live', error: 'dot-err', load: 'dot-load' }[type] || 'dot-load');
  document.getElementById('status-txt').textContent = text;
}

/* ── Dot rail ────────────────────────────────────────────────── */
function buildDots(count) {
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const dot = document.createElement('div');
    dot.className = 'ndot' + (i === 0 ? ' active' : '');
    dot.id = `dot-${i}`;
    dot.title = slides[i]?.name || `Slide ${i + 1}`;
    dot.onclick = () => goTo(i);
    dots.appendChild(dot);
  }
}

function updateDots(idx) {
  document.querySelectorAll('.ndot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

/* ── Auto-scroll ─────────────────────────────────────────────── */
function startAutoScroll() {
  stopAutoScroll();
  const slide = slides[current];
  if (!slide?.autoScroll) return;

  const container = document.getElementById('qs-container');
  if (!container) return;
  container.classList.add('scrolling');
  scrollDir = 1;

  scrollTimer = setInterval(() => {
    const currentTransform = container.style.transform || 'translateY(0px)';
    const currentY = parseInt(currentTransform.replace(/[^0-9\-]/g, ''), 10) || 0;
    const maxScroll = -SCROLL_STEP * 8;
    const newY = scrollDir === 1
      ? Math.max(currentY - SCROLL_STEP, maxScroll)
      : Math.min(currentY + SCROLL_STEP, 0);
    container.style.transform = `translateY(${newY}px)`;
    scrollDir *= -1;
  }, SCROLL_INTERVAL * 1000);
}

function stopAutoScroll() {
  if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
  scrollDir = 0;
  const container = document.getElementById('qs-container');
  if (container) {
    container.classList.remove('scrolling');
    container.style.transform = '';
  }
}

/* ── Embed dashboard via SDK ─────────────────────────────────── */
async function embedDashboard(embedUrl, initialSheetId, isAutoScroll) {
  const vp = document.getElementById('viewport');

  // Remove old container and give SDK time to clean up
  const oldContainer = document.getElementById('qs-container');
  if (oldContainer) {
    oldContainer.remove();
  }
  embeddedDash = null;
  dashLoaded = false;

  // Brief delay to let the QuickSight SDK finish tearing down the
  // previous iframe / embedding context before we create a new one.
  await new Promise(r => setTimeout(r, 200));

  const container = document.createElement('div');
  container.id = 'qs-container';
  if (isAutoScroll) container.classList.add('scrolling');
  vp.appendChild(container);

  const { createEmbeddingContext } = window.QuickSightEmbedding;
  const context = await createEmbeddingContext();

  await new Promise((resolve, reject) => {
    context.embedDashboard(
      {
        url:                   embedUrl,
        container:             container,
        height:                '100%',
        width:                 '100%',
        withIframePlaceholder: true,
      },
      {
        toolbarOptions: {
          export:   false,
          undoRedo: false,
          reset:    false,
        },
        sheetOptions: {
          initialSheetId:                    initialSheetId,
          singleSheet:                       false,
          emitSizeChangedEventOnSheetChange: false,
        },
        themeOptions: {
          themeArn: "arn:aws:quicksight::aws:theme/MIDNIGHT",
          preloadThemes: [
            "arn:aws:quicksight::aws:theme/MIDNIGHT",
            "arn:aws:quicksight::aws:theme/RAINIER",
          ],
        },
        attributionOptions: {
          overlayContent: false,
        },
        onMessage: (messageEvent) => {
          if (messageEvent.eventName === 'CONTENT_LOADED') {
            dashLoaded = true;
            console.log('[QS] CONTENT_LOADED — slide:', slides[current]?.name);
            resolve();
          }
          if (messageEvent.eventName === 'ERROR_OCCURRED') {
            console.error('[QS] ERROR_OCCURRED:', messageEvent);
            reject(new Error(messageEvent.error || 'Unknown embed error'));
          }
        },
      }
    ).then((dashboard) => {
      embeddedDash = dashboard;
    });
  });

  console.log('[QS] CONTENT_LOADED — current slide:', slides[current]?.name);

  // Late-navigate to the correct sheet if initialSheetId didn't land us there
  if (initialSheetId) {
    try {
      await new Promise(r => setTimeout(r, 300));
      await embeddedDash.setSelectedSheetId(initialSheetId);
    } catch (e) {
      console.error('[QS] Late-navigate failed:', e);
    }
  }
}

/* ── Navigate to sheet ───────────────────────────────────────── */
async function navigateToSheet(sheetId) {
  if (!embeddedDash || !sheetId) return;
  if (!dashLoaded) {
    // Wait for content to load before navigating
    await new Promise(r => setTimeout(r, 500));
    if (!dashLoaded) return;
  }
  try {
    console.log('[NAV] setSelectedSheetId:', sheetId);
    const result = await embeddedDash.setSelectedSheetId(sheetId);
    console.log('[NAV] result:', result);
  } catch (e) {
    console.error('[NAV] error:', e);
  }
}

/* ── Rotation ────────────────────────────────────────────────── */
async function goTo(idx) {
  stopAutoScroll();
  const oldDot = document.getElementById(`dot-${current}`);
  if (oldDot) oldDot.classList.remove('active');

  const oldDashboardId = slides[current]?.dashboardId;
  const newSlide = slides[idx];
  const needsReembed = newSlide.dashboardId !== oldDashboardId;

  current = idx;
  updateDots(current);
  document.getElementById('hud-name').textContent  = newSlide.name || '—';
  document.getElementById('hud-count').textContent = `(${current + 1} / ${slides.length})`;
  rotCount = rotSecs;

  if (needsReembed) {
    // Different dashboard — fetch a fresh embed URL and re-embed.
    // We must NOT reuse the cached embedUrl from startup because the
    // QuickSight authorization token in it gets consumed and becomes
    // invalid for a new EmbeddingContext.
    try {
      const freshUrl = await fetchFreshEmbedUrl(newSlide);
      await embedDashboard(freshUrl, newSlide.sheetId, newSlide.autoScroll);
    } catch (err) {
      console.error('[GOTO] Failed to get fresh embed URL:', err);
      setStatus('error', 'Embed error');
      overlay('⚠', 'Embed Error', err.message, true);
      // Restore current index since embed failed
      current = idx;
      updateDots(current);
      return;
    }
    setStatus('live', 'Live');
  } else {
    // Same dashboard — just navigate to the sheet
    await navigateToSheet(newSlide.sheetId);
  }
  setTimeout(startAutoScroll, 700);
}

function next() { goTo((current + 1) % slides.length); }

/* ── HUD update ──────────────────────────────────────────────── */
function updateHUD() {
  if (!ready) return;
  const pct = rotCount / rotSecs;
  document.getElementById('ring-fill').style.strokeDashoffset = CIRC * (1 - pct);
  document.getElementById('ring-num').textContent  = Math.ceil(rotCount);
  document.getElementById('prog-fill').style.width = ((1 - pct) * 100) + '%';
  const m = Math.floor(refCount / 60), s = String(Math.floor(refCount % 60)).padStart(2, '0');
  document.getElementById('hud-ref').textContent   = `${m}:${s}`;
}

/* ── Clock ───────────────────────────────────────────────────── */
function tickClock() {
  document.getElementById('hud-clock').textContent =
    new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(tickClock, 1000);
tickClock();

/* ── API calls ───────────────────────────────────────────────── */
async function fetchConfig() {
  const res = await fetch('/api/config');
  if (!res.ok) throw new Error(`Config fetch failed: HTTP ${res.status}`);
  return res.json();
}

async function fetchEmbedUrls() {
  const res = await fetch('/api/embed');
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.hint || body.error || `HTTP ${res.status}`);
  }
  return (await res.json()).slides;
}

async function fetchFreshEmbedUrl(slide) {
  const res = await fetch('/api/embed-url', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      dashboardId: slide.dashboardId,
      sheetId:     slide.sheetId,
      visualId:    slide.visualId,
      name:        slide.name,
    }),
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.hint || body.error || `HTTP ${res.status}`);
  }
  return (await res.json()).embedUrl;
}

/* ── Refresh every 10 min ────────────────────────────────────── */
async function refresh() {
  setStatus('load', 'Refreshing');
  stopAutoScroll();
  const flash = document.getElementById('flash');
  flash.style.opacity = '0.06';
  setTimeout(() => { flash.style.opacity = '0'; }, 300);
  try {
    slides = await fetchEmbedUrls();
    // If current index is out of bounds after refresh, clamp it
    current = Math.min(current, slides.length - 1);
    await embedDashboard(slides[current].embedUrl, slides[current].sheetId, slides[current]?.autoScroll);
    refCount = refSecs;
    setStatus('live', 'Live');
    if (ready) startAutoScroll();
  } catch (err) {
    console.error('Refresh failed:', err.message);
    setStatus('error', 'Refresh failed');
  }
}

/* ── Main tick ───────────────────────────────────────────────── */
function startTicker() {
  if (ticker) clearInterval(ticker);
  ticker = setInterval(() => {
    if (!ready) return;
    rotCount = Math.max(0, rotCount - 1);
    refCount = Math.max(0, refCount - 1);
    updateHUD();
    if (rotCount <= 0) next();
    if (refCount <= 0) refresh();
  }, 1000);
}

/* ── Boot ────────────────────────────────────────────────────── */
async function init() {
  ready        = false;
  embeddedDash = null;
  dashLoaded   = false;
  overlay('⏳', 'Loading dashboards', 'Fetching configuration and signed embed URLs…');

  try {
    const cfg = await fetchConfig();
    document.getElementById('hud-title').textContent = cfg.title;
    document.title = cfg.title;
    rotSecs  = cfg.rotateMs  / 1000;
    refSecs  = cfg.refreshMs / 1000;
    rotCount = rotSecs;
    refCount = refSecs;
    autoScrollSlides = cfg.autoScrollSlides || [];

    slides = cfg.slideNames.map(name => ({ name, sheetId: null, embedUrl: '', autoScroll: false }));
    slides.forEach((s, i) => { s.autoScroll = autoScrollSlides.includes(i); });
    buildDots(cfg.slideCount);

    setStatus('load', 'Fetching URLs');
    slides = await fetchEmbedUrls();

    current = 0;
    await embedDashboard(slides[0].embedUrl, slides[0].sheetId, slides[0]?.autoScroll);
    updateDots(0);

    document.getElementById('hud-name').textContent  = slides[0].name;
    document.getElementById('hud-count').textContent = `(1 / ${slides.length})`;

    setStatus('live', 'Live');
    hideOverlay();
    ready = true;
    startTicker();
    setTimeout(startAutoScroll, 700);

  } catch (err) {
    console.error('Init failed:', err);
    setStatus('error', 'Error');
    overlay('⚠', 'Connection Error', err.message, true);
  }
}

init();
</script>
</body>
</html>
