<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickSight Kiosk</title>
<script src="https://unpkg.com/amazon-quicksight-embedding-sdk@2.9.0/dist/quicksight-embedding-js-sdk.min.js"></script>
<style>
  :root {
    --bg:        #0d0f12;
    --surface:   #151820;
    --border:    #1f2430;
    --accent:    #e8973a;
    --text:      #c9d1e0;
    --muted:     #4a5268;
    --green:     #3ecf8e;
    --red:       #e85a4f;
    --font:      'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
    --ease:      600ms cubic-bezier(0.4, 0, 0.2, 1);
    --hud-h:     52px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; user-select: none; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; height: var(--hud-h);
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 18px; z-index: 100;
  }
  .h-logo  { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; white-space: nowrap; }
  .h-div   { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
  .h-label { font-size: 10px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .h-val   { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .h-name  { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
  .h-count { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .spacer  { flex: 1; }
  .h-status { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .dot      { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-live { background: var(--green); animation: pulse 2s ease-in-out infinite; }
  .dot-err  { background: var(--red); }
  .dot-load { background: var(--accent); animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .ring     { width: 28px; height: 28px; flex-shrink: 0; position: relative; }
  .ring svg { transform: rotate(-90deg); }
  .r-track  { stroke: var(--border); fill: none; }
  .r-fill   { stroke: var(--accent); fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  #ring-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--accent); }

  #prog { position: fixed; top: var(--hud-h); left: 0; right: 0; height: 3px; background: var(--border); z-index: 100; }
  #prog-fill { height: 100%; background: var(--accent); transition: width 1s linear; width: 0; }

  #viewport { position: fixed; top: calc(var(--hud-h) + 3px); left: 0; right: 0; bottom: 0; overflow: hidden; }
  #qs-container { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ── Auto-scroll for slides that need it ──────────────────── */
  #qs-container.scrolling {
    /* Height is set explicitly in JS based on scrollContentHeight config */
    transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  #dots {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 100; align-items: center;
    max-width: 90vw; flex-wrap: wrap; justify-content: center;
  }
  .ndot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); cursor: pointer; transition: background 0.3s, transform 0.3s; flex-shrink: 0; }
  .ndot.active { background: var(--accent); transform: scale(1.4); }
  .ndot:hover  { background: var(--text); }

  #overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px; z-index: 200; transition: opacity 0.5s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #ov-icon  { font-size: 30px; }
  #ov-title { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  #ov-msg   { font-size: 11px; color: var(--muted); max-width: 440px; text-align: center; line-height: 1.9; }
  #retry    { padding: 9px 26px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--font); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 4px; display: none; }
  #retry:hover { background: rgba(232,151,58,0.1); }

  #flash { position: fixed; inset: 0; background: var(--accent); opacity: 0; pointer-events: none; z-index: 190; transition: opacity 0.25s; }

  #pause-btn {
    padding: 3px 10px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: var(--font); font-size: 9px;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    border-radius: 3px; white-space: nowrap; transition: color 0.2s, border-color 0.2s;
  }
  #pause-btn:hover { color: var(--accent); border-color: var(--accent); }
  #pause-btn.paused { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div id="hud">
  <span class="h-logo" id="hud-title">Kiosk</span>
  <div class="h-div"></div>
  <span class="h-label">Now showing</span>
  <span class="h-name" id="hud-name">Loading…</span>
  <span class="h-count" id="hud-count"></span>
  <div class="h-div"></div>
  <span class="h-label">Next in</span>
  <div class="ring">
    <svg width="28" height="28" viewBox="0 0 28 28">
      <circle class="r-track" cx="14" cy="14" r="11" stroke-width="2.5"/>
      <circle class="r-fill" id="ring-fill" cx="14" cy="14" r="11" stroke-width="2.5" stroke-dasharray="69.1" stroke-dashoffset="0"/>
    </svg>
    <div id="ring-num">—</div>
  </div>
  <div class="h-div"></div>
  <span class="h-label">Refresh in</span>
  <span class="h-val" id="hud-ref">—</span>
  <div class="spacer"></div>
  <span class="h-val" id="hud-clock" style="font-size:11px"></span>
  <div class="h-div"></div>
  <button id="pause-btn" onclick="togglePause()" style="display:none">❚❚ Pause</button>
  <div class="h-status">
    <div class="dot dot-load" id="status-dot"></div>
    <span id="status-txt">Connecting</span>
  </div>
</div>

<div id="prog"><div id="prog-fill"></div></div>
<div id="viewport"></div>
<div id="dots"></div>
<div id="flash"></div>

<div id="overlay">
  <div id="ov-icon">⏳</div>
  <div id="ov-title">Loading dashboards</div>
  <div id="ov-msg">Fetching configuration and signed embed URLs…</div>
  <button id="retry" onclick="init()">↺ Retry</button>
</div>

<script>
/* ── Logger ──────────────────────────────────────────────────── */
class Logger {
  constructor(tag) { this.tag = tag; this.debug = false; }
  _ts()            { return new Date().toISOString(); }
  _fmt(fn, params) { return `[${this._ts()}] [${this.tag}] [${fn}]${params !== undefined ? ' ' + JSON.stringify(params) : ''}`; }
  info(fn, params) { if (this.debug) console.log(this._fmt(fn, params)); }
  warn(fn, params) { if (this.debug) console.warn(this._fmt(fn, params)); }
  error(fn, params){ console.error(this._fmt(fn, params)); }
}
const log = new Logger('kiosk');

/* ── Runtime state ───────────────────────────────────────────── */
let slides           = [];
let current          = 0;
let rotSecs          = 60;
let refSecs          = 600;
let rotCount         = 60;
let refCount         = 600;
let ready            = false;
let ticker           = null;
let embeddedItem     = null;
let embedContext     = null;
let itemLoaded       = false;
let scrollTimer      = null;
let scrollDir        = 0;
let autoScrollSlides = [];
let paused           = false;
let stepSize         = 120;
let maxScroll        = -960;
let busy             = false;
const CIRC           = 2 * Math.PI * 11;

/* ── Helpers ─────────────────────────────────────────────────── */
// Shows the full-screen overlay with an icon, title, message, and optional retry button
function overlay(icon, title, msg, showRetry = false) {
  log.info('overlay', { icon, title, msg, showRetry });

  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('ov-icon').textContent  = icon;
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-msg').textContent   = msg;
  document.getElementById('retry').style.display  = showRetry ? 'inline-block' : 'none';
}
// Hides the full-screen overlay
function hideOverlay() {
  log.info('hideOverlay');

  document.getElementById('overlay').classList.add('hidden');
}

// Updates the HUD status indicator dot and label text
function setStatus(type, text) {
  log.info('setStatus', { type, text });

  const d = document.getElementById('status-dot');
  d.className = 'dot ' + ({ live: 'dot-live', error: 'dot-err', load: 'dot-load' }[type] || 'dot-load');
  document.getElementById('status-txt').textContent = text;
}

/* ── Dot rail ────────────────────────────────────────────────── */
// Builds the slide navigation dot rail based on the number of slides
function buildDots(count) {
  log.info('buildDots', { count });

  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const dot = document.createElement('div');
    dot.className = 'ndot' + (i === 0 ? ' active' : '');
    dot.id = `dot-${i}`;
    dot.title = slides[i]?.name || `Slide ${i + 1}`;
    dot.onclick = () => goTo(i);
    dots.appendChild(dot);
  }
}

// Sets the active dot in the navigation rail to the given slide index
function updateDots(idx) {
  log.info('updateDots', { idx });

  document.querySelectorAll('.ndot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

/* ── Auto-scroll ─────────────────────────────────────────────── */
// Starts the auto-scroll animation for the current slide if it has autoScroll enabled
function startAutoScroll() {
  log.info('startAutoScroll', { slide: slides[current]?.name, autoScroll: slides[current]?.autoScroll });

  stopAutoScroll();
  const slide = slides[current];
  if (!slide?.autoScroll) return;

  const container = document.getElementById('qs-container');
  if (!container) return;
  container.classList.add('scrolling');
  scrollDir = 1;

  // Find the QuickSight iframe inside the container
  const iframe = container.querySelector('iframe');
  if (!iframe) {
    log.warn('startAutoScroll', { status: 'no iframe found in container' });
    return;
  }

  // Use the configured content height (set on the iframe by embedItem).
  // iframe.scrollHeight is unreliable for cross-origin frames — use offsetHeight instead,
  // which reflects the explicit pixel height we gave the iframe.
  const iframeH = iframe.offsetHeight || slide.scrollContentHeight || 1800;
  const viewportH = document.getElementById('viewport').clientHeight || window.innerHeight;

  // Dynamic scroll params — only scroll the overflow (content below the fold)
  const scrollSteps = slide.scrollSteps || 8;
  const scrollIntervalMs = (rotSecs * 1000) / scrollSteps;
  const scrollableDistance = Math.max(iframeH - viewportH, 0);
  stepSize = scrollableDistance / scrollSteps;
  maxScroll = -scrollableDistance;
  log.info('startAutoScroll', { iframeH, viewportH, scrollableDistance, scrollSteps, scrollIntervalMs, stepSize: +stepSize.toFixed(1), maxScroll });

  scrollTimer = setInterval(() => {
    const currentTransform = container.style.transform || 'translateY(0px)';
    const currentY = parseFloat(currentTransform.match(/translateY\(([-\d.]+)px\)/)?.[1]) || 0;
    const newY = Math.max(currentY - stepSize, maxScroll);
    container.style.transform = `translateY(${newY}px)`;
    log.info('startAutoScroll:tick', { from: +currentY.toFixed(1), to: +newY.toFixed(1) });
  }, scrollIntervalMs);
}

// Stops auto-scroll, clears the scroll timer, and resets container transform
function stopAutoScroll() {
  log.info('stopAutoScroll', { scrollTimerActive: !!scrollTimer });

  if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
  scrollDir = 0;
  const container = document.getElementById('qs-container');
  if (container) {
    container.classList.remove('scrolling');
    container.style.transform = '';
  }
}

// Pauses auto-scroll by clearing the scroll interval without resetting the container position
function pauseAutoScroll() {
  log.info('pauseAutoScroll', { scrollTimerActive: !!scrollTimer });

  if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
}

// Resumes auto-scroll from the current position for the active slide
function resumeAutoScroll() {
  log.info('resumeAutoScroll', { slide: slides[current]?.name, autoScroll: slides[current]?.autoScroll });

  const slide = slides[current];
  if (!slide?.autoScroll) return;
  const container = document.getElementById('qs-container');
  if (!container) return;

  const iframe = container.querySelector('iframe');
  if (!iframe) return;

  const iframeH = iframe.offsetHeight || slide.scrollContentHeight || 1800;
  const viewportH = document.getElementById('viewport').clientHeight || window.innerHeight;

  const scrollSteps = slide.scrollSteps || 8;
  const scrollIntervalMs = (rotSecs * 1000) / scrollSteps;
  const scrollableDistance = Math.max(iframeH - viewportH, 0);
  stepSize = scrollableDistance / scrollSteps;
  maxScroll = -scrollableDistance;
  log.info('resumeAutoScroll', { iframeH, viewportH, scrollableDistance, scrollSteps, scrollIntervalMs, stepSize: +stepSize.toFixed(1), maxScroll });

  scrollTimer = setInterval(() => {
    const currentTransform = container.style.transform || 'translateY(0px)';
    const currentY = parseFloat(currentTransform.match(/translateY\(([-\d.]+)px\)/)?.[1]) || 0;
    const newY = Math.max(currentY - stepSize, maxScroll);
    container.style.transform = `translateY(${newY}px)`;
    log.info('resumeAutoScroll:tick', { from: +currentY.toFixed(1), to: +newY.toFixed(1) });
  }, scrollIntervalMs);
}

/* ── Pause / Resume ──────────────────────────────────────────── */
// Toggles the kiosk rotation between paused and playing states
function togglePause() {
  log.info('togglePause', { pausedBefore: paused });

  paused = !paused;
  const btn = document.getElementById('pause-btn');
  if (paused) {
    btn.textContent = '▶ Play';
    btn.classList.add('paused');
    setStatus('live', 'Paused');
    pauseAutoScroll();
  } else {
    btn.textContent = '❚❚ Pause';
    btn.classList.remove('paused');
    setStatus('live', 'Live');
    resumeAutoScroll();
  }
}

/* ── Embed dashboard via SDK ─────────────────────────────────── */
// Tears down any existing QuickSight embed and creates a fresh one for the given URL and sheet
async function embedItem(embedUrl, initialSheetId, isAutoScroll) {
  log.info('embedItem', { embedUrl, initialSheetId, isAutoScroll });

  if (!embedUrl) throw new Error('embedUrl is empty — server may have returned no URL for this slide');
  const vp = document.getElementById('viewport');

  // Dispose the previous EmbeddingContext and clean up all leaked
  // body-level QuickSight iframes before creating a new one.
  if (embedContext) {
    try { embedContext.dispose(); } catch (_) { /* no-op */ }
    embedContext = null;
  }

  // Remove any orphaned QuickSight iframes that the SDK left in
  // <body> across previous embedding-context lifetimes.
  document.querySelectorAll('iframe.quicksight-embedding-iframe').forEach(f => f.remove());

  // Remove old container
  const oldContainer = document.getElementById('qs-container');
  if (oldContainer) oldContainer.remove();

  embeddedItem = null;
  itemLoaded = false;

  const container = document.createElement('div');
  container.id = 'qs-container';
  if (isAutoScroll) container.classList.add('scrolling');
  vp.appendChild(container);

  const { createEmbeddingContext } = window.QuickSightEmbedding;
  embedContext = await createEmbeddingContext();

  await new Promise((resolve, reject) => {
    const timeout = setTimeout(() => {
      reject(new Error('Timed out waiting for QuickSight CONTENT_LOADED (30s)'));
    }, 30_000);

    const contentH = isAutoScroll ? (slides[current]?.scrollContentHeight || 1800) : null;
    if (isAutoScroll && contentH) {
      container.style.height = contentH + 'px';
    }
    const frameOptions = {
      url:                   embedUrl,
      container:             container,
      height:                isAutoScroll ? (contentH + 'px') : '100%',
      width:                 '100%',
      withIframePlaceholder: true,
    };

    const contentOptions = {
      toolbarOptions: {
        export:   false,
        undoRedo: false,
        reset:    false,
      },
      sheetOptions: {
        initialSheetId:                    initialSheetId,
        singleSheet:                       false,
        emitSizeChangedEventOnSheetChange: false,
      },
      themeOptions: {
        themeArn: "arn:aws:quicksight::aws:theme/MIDNIGHT",
        preloadThemes: [
          "arn:aws:quicksight::aws:theme/MIDNIGHT",
          "arn:aws:quicksight::aws:theme/RAINIER",
        ],
      },
      attributionOptions: {
        overlayContent: false,
      },
      onMessage: (messageEvent) => {
        if (messageEvent.eventName === 'CONTENT_LOADED') {
          clearTimeout(timeout);
          itemLoaded = true;
          log.info('embedItem:CONTENT_LOADED', { slide: slides[current]?.name });
          resolve();
        }
        if (messageEvent.eventName === 'ERROR_OCCURRED') {
          clearTimeout(timeout);
          log.error('embedItem:ERROR_OCCURRED', { event: messageEvent });
          reject(new Error(messageEvent.error || 'Unknown embed error'));
        }
      },
    };

    // Embed the dashboard if we dont have a visualId, otherwise embed the visual directly
    let func;
    if (slides[current]?.visualId) {
      func = embedContext.embedVisual;
    } else {
      func = embedContext.embedDashboard;
    }
    func(frameOptions, contentOptions).then((item) => {
      embeddedItem = item;
    }).catch((err) => {
      clearTimeout(timeout);
      reject(err);
    });
  });

  log.info('embedItem', { status: 'ready', slide: slides[current]?.name });

  // Late-navigate to the correct sheet if initialSheetId didn't land us there
  if (initialSheetId) {
    try {
      await new Promise(r => setTimeout(r, 300));
      await embedContext.setSelectedSheetId(initialSheetId);
    } catch (e) {
      log.error('embedItem:late-navigate', { error: e?.message });
    }
  }
}

/* ── Navigate to sheet ───────────────────────────────────────── */
// Navigates the currently embedded dashboard to a specific sheet by ID
async function navigateToSheet(sheetId) {
  log.info('navigateToSheet', { sheetId, embeddedItemReady: !!embeddedItem, itemLoaded });

  if (!embeddedItem || !sheetId) return;
  if (!itemLoaded) {
    // Wait for content to load before navigating
    await new Promise(r => setTimeout(r, 500));
    if (!itemLoaded) return;
  }
  try {
    log.info('navigateToSheet', { status: 'setSelectedSheetId', sheetId });
    const result = await embeddedItem.setSelectedSheetId(sheetId);
    log.info('navigateToSheet', { status: 'result', result });
  } catch (e) {
    log.error('navigateToSheet', { error: e?.message });
  }
}

/* ── Rotation ────────────────────────────────────────────────── */
// Public entry point for slide navigation — guards against concurrent embed operations
async function goTo(idx) {
  log.info('goTo', { idx, busy });

  // Skip if refresh() is already mid-flight to prevent two embedItem()
  // calls from racing each other and tearing down each other's iframes.
  if (busy) return;
  busy = true;
  try {
    await _goTo(idx);
  } finally {
    busy = false;
  }
}

// Core slide transition logic — handles re-embed vs sheet navigation based on dashboard ID change
async function _goTo(idx) {
  log.info('_goTo', { idx, current, slide: slides[idx]?.name });

  stopAutoScroll();
  const oldDot = document.getElementById(`dot-${current}`);
  if (oldDot) oldDot.classList.remove('active');

  // Determine if we need to re-embed (if dashboard or visual changed) or can just navigate to a different sheet
  const oldDashboardId = slides[current]?.dashboardId;
  const oldVisualId = slides[current]?.visualId;
  const newSlide = slides[idx];
  const needsReembed = newSlide.dashboardId !== oldDashboardId || newSlide.visualId !== oldVisualId;

  current = idx;
  updateDots(current);
  document.getElementById('hud-name').textContent  = newSlide.name || '—';
  document.getElementById('hud-count').textContent = `(${current + 1} / ${slides.length})`;

  if (needsReembed) {
    // Different dashboard/visual — fetch a fresh embed URL and re-embed.
    // We must NOT reuse the cached embedUrl from startup because the
    // QuickSight authorization token in it gets consumed and becomes
    // invalid for a new EmbeddingContext.
    try {
      const freshUrl = await fetchFreshEmbedUrl(newSlide);
      await embedItem(freshUrl, !newSlide?.visualId ? newSlide.sheetId : null, newSlide.autoScroll); // we set initalSheetId to null when we are attempting to use a visualId because the embedUrl for a visual doesn't support initialSheetId param, and setting it causes the embed to fail
      rotCount = rotSecs;
    } catch (err) {
      log.error('_goTo', { error: err?.message });
      setStatus('error', 'Embed error');
      overlay('⚠', 'Embed Error', err.message, true);
      // Restore current index since embed failed
      current = idx;
      updateDots(current);
      rotCount = rotSecs;
      return;
    }
    setStatus('live', 'Live');
  } else {
    // Same dashboard — just navigate to the sheet
    await navigateToSheet(newSlide.sheetId);
    rotCount = rotSecs;
  }
  setTimeout(startAutoScroll, 700);
}

// Advances to the next slide in the rotation, wrapping around at the end
function next() {
  log.info('next', { current, nextIdx: (current + 1) % slides.length });

  goTo((current + 1) % slides.length);
}

/* ── HUD update ──────────────────────────────────────────────── */
// Syncs the HUD ring, progress bar, and refresh countdown to the current tick state
function updateHUD() {
  //log.info('updateHUD', { rotCount, refCount, ready });

  if (!ready) return;
  const pct = rotCount / rotSecs;
  document.getElementById('ring-fill').style.strokeDashoffset = CIRC * (1 - pct);
  document.getElementById('ring-num').textContent  = Math.ceil(rotCount);
  document.getElementById('prog-fill').style.width = ((1 - pct) * 100) + '%';
  const m = Math.floor(refCount / 60), s = String(Math.floor(refCount % 60)).padStart(2, '0');
  document.getElementById('hud-ref').textContent   = `${m}:${s}`;
}

/* ── Clock ───────────────────────────────────────────────────── */
// Updates the HUD clock display to the current local time
function tickClock() {
  //log.info('tickClock');

  document.getElementById('hud-clock').textContent =
    new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(tickClock, 1000);
tickClock();

/* ── API calls ───────────────────────────────────────────────── */
// Fetches the kiosk configuration from the server
async function fetchConfig() {
  log.info('fetchConfig');

  const res = await fetch('/api/config');
  if (!res.ok) throw new Error(`Config fetch failed: HTTP ${res.status}`);
  return res.json();
}

// Fetches all slide embed URLs from the server in one batch request
async function fetchEmbedUrls() {
  log.info('fetchEmbedUrls');

  const res = await fetch('/api/embed');
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.hint || body.error || `HTTP ${res.status}`);
  }
  return (await res.json()).slides;
}

// Fetches a single fresh embed URL for a given slide (used when navigating between different dashboards)
async function fetchFreshEmbedUrl(slide) {
  log.info('fetchFreshEmbedUrl', { slide: slide?.name, dashboardId: slide?.dashboardId, sheetId: slide?.sheetId, visualId: slide?.visualId });

  const res = await fetch('/api/embed-url', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      dashboardId: slide.dashboardId,
      sheetId:     slide.sheetId,
      visualId:    slide.visualId,
      name:        slide.name,
    }),
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.hint || body.error || `HTTP ${res.status}`);
  }
  return (await res.json()).embedUrl;
}

/* ── Refresh every 10 min ────────────────────────────────────── */
// Re-fetches all embed URLs and re-embeds the current slide to refresh stale QuickSight tokens
async function refresh() {
  log.info('refresh', { current, busy });

  // Reset immediately so the ticker doesn't re-trigger while we await.
  refCount = refSecs;
  // Skip if goTo() is already embedding — prevents two embedItem()
  // calls from racing and corrupting the QuickSight iframe/context.
  if (busy) return;
  busy = true;
  try {
    setStatus('load', 'Refreshing');
    stopAutoScroll();
    const flash = document.getElementById('flash');
    flash.style.opacity = '0.06';
    setTimeout(() => { flash.style.opacity = '0'; }, 300);
    slides = await fetchEmbedUrls();
    // If current index is out of bounds after refresh, clamp it
    current = Math.min(current, slides.length - 1);
    await embedItem(slides[current].embedUrl, !slides[current]?.visualId ? slides[current].sheetId : null, slides[current]?.autoScroll); // we set initalSheetId to null when we are attempting to use a visualId because the embedUrl for a visual doesn't support initialSheetId param, and setting it causes the embed to fail
    setStatus('live', 'Live');
    if (ready) startAutoScroll();
  } catch (err) {
    log.error('refresh', { error: err.message });
    setStatus('error', 'Refresh failed');
  } finally {
    busy = false;
  }
}

/* ── Main tick ───────────────────────────────────────────────── */
// Starts the 1-second interval ticker that drives rotation, refresh, and HUD updates
function startTicker() {
  log.info('startTicker', { rotSecs, refSecs });

  if (ticker) clearInterval(ticker);
  ticker = setInterval(() => {
    if (!ready) return;
    if (!paused) {
      rotCount = Math.max(0, rotCount - 1);
      refCount = Math.max(0, refCount - 1);
    }
    updateHUD();
    if (rotCount <= 0 && !busy) next();
    if (refCount <= 0 && !busy) refresh();
  }, 1000);
}

/* ── Boot ────────────────────────────────────────────────────── */
// Bootstraps the kiosk — fetches config and embed URLs, embeds the first slide, and starts the ticker
async function init() {
  log.info('init');

  ready        = false;
  embeddedItem = null;
  itemLoaded   = false;
  overlay('⏳', 'Loading dashboards', 'Fetching configuration and signed embed URLs…');

  try {
    const cfg = await fetchConfig();
    log.debug = !!cfg.debug;
    document.getElementById('hud-title').textContent = cfg.title;
    document.title = cfg.title;
    rotSecs  = cfg.rotateMs  / 1000;
    refSecs  = cfg.refreshMs / 1000;
    rotCount = rotSecs;
    refCount = refSecs;
    autoScrollSlides = cfg.autoScrollSlides || [];

    slides = cfg.slideNames.map(name => ({ name, sheetId: null, embedUrl: '', autoScroll: false }));
    slides.forEach((s, i) => { s.autoScroll = autoScrollSlides.includes(i); });
    buildDots(cfg.slideCount);

    setStatus('load', 'Fetching URLs');
    slides = await fetchEmbedUrls();

    current = 0;
    await embedItem(slides[0].embedUrl, !slides[0]?.visualId ? slides[0].sheetId : null, slides[0]?.autoScroll); // we set initalSheetId to null when we are attempting to use a visualId because the embedUrl for a visual doesn't support initialSheetId param, and setting it causes the embed to fail
    updateDots(0);

    document.getElementById('hud-name').textContent  = slides[0].name;
    document.getElementById('hud-count').textContent = `(1 / ${slides.length})`;

    setStatus('live', 'Live');
    hideOverlay();
    ready = true;
    document.getElementById('pause-btn').style.display = '';
    startTicker();
    setTimeout(startAutoScroll, 700);

  } catch (err) {
    log.error('init', { error: err?.message });
    setStatus('error', 'Error');
    overlay('⚠', 'Connection Error', err.message, true);
  }
}

window.addEventListener('beforeunload', () => {
  if (embedItem) { try { embedItem.dispose(); } catch (_) {} }
});

init();
</script>
